<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ユメタン 0 フラッシュカード</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a2e">
<meta name="description" content="ユメタン 0 英語語句フラッシュカード">

<!-- iOS Safari ホーム画面対応 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ユメタン 0">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<!-- Service Worker 登録 -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.warn('SW registration failed:', err));
    });
  }
</script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --paper: #f5f0e8;
    --accent: #e85d26;
    --accent2: #2563eb;
    --muted: #8a8070;
    --card-bg: #fffdf7;
    --border: #d8d0c0;
    --user-card-bg: #fffdf7;   /* 単語カード(表)の背景色 - ユーザーが変更可 */
    --user-card-text: #1a1a2e; /* 単語カード(表)の文字色 - ユーザーが変更可 */
    --user-back-bg: #1a1a2e;      /* 単語カード(裏)の背景色 - ユーザーが変更可 */
    --user-back-word: #ffffff;    /* 単語カード(裏)の単語の文字色 */
    --user-back-meaning: #e85d26; /* 単語カード(裏)の意味の文字色 */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', 'Noto Sans JP', sans-serif;
    background: var(--paper);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 16px 48px;
    color: var(--ink);
  }

  /* Header */
  header {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 18px;
  }
  .unit-badge {
    font-size: 0.7rem;
    font-weight: 900;
    letter-spacing: 0.2em;
    color: var(--accent);
    border: 2px solid var(--accent);
    padding: 3px 12px;
    border-radius: 3px;
    margin-bottom: 7px;
    text-transform: uppercase;
  }
  h1 {
    font-family: 'Outfit', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--ink);
    letter-spacing: -0.02em;
    text-align: center;
    line-height: 1.1;
  }
  .sub {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 4px;
    text-align: center;
  }

  /* Name setup */
  #nameSetup {
    width: 100%;
    max-width: 400px;
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }
  #nameSetup p { font-size: 0.95rem; font-weight: 700; }
  #nameInput {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-size: 1rem;
    font-family: inherit;
    background: white;
    color: var(--ink);
    outline: none;
  }
  #nameInput:focus { border-color: var(--accent2); }
  .btn-start {
    background: var(--ink);
    color: white;
    border: none;
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-start:hover { background: var(--accent2); }

  /* Main app */
  #app { display: none; width: 100%; max-width: 520px; flex-direction: column; align-items: center; }

  /* User bar */
  .user-bar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 11px;
    font-size: 0.82rem;
  }
  .user-name { font-weight: 700; color: var(--accent2); }
  .learned-count { color: var(--muted); }

  /* Progress */
  .progress-wrap {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .progress-bar-bg {
    flex: 1;
    height: 5px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.4s;
  }
  .counter { font-size: 0.78rem; font-weight: 700; color: var(--muted); min-width: 48px; text-align: right; }

  /* Section tag */
  .section-pill {
    align-self: flex-start;
    font-size: 0.72rem;
    font-weight: 700;
    background: var(--ink);
    color: var(--paper);
    padding: 3px 10px;
    border-radius: 4px;
    margin-bottom: 12px;
    letter-spacing: 0.05em;
  }

  /* Card */
  .card-wrap {
    width: 100%;
    height: 240px;
    perspective: 1000px;
    cursor: pointer;
    margin-bottom: 18px;
  }
  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(.4,0,.2,1);
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 14px;
    border: 2px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 28px;
    background: var(--card-bg);
    box-shadow: 4px 4px 0 var(--border);
  }
  .card-back {
    background: var(--user-back-bg);
    border-color: var(--user-back-bg);
    box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
    transform: rotateY(180deg);
  }
  /* 表カードはユーザーが色を変更できる */
  .card-front { background: var(--user-card-bg); }
  .card-front .word { color: var(--user-card-text); }
  .card-front .face-label,
  .card-front .pos { color: var(--user-card-text); opacity: 0.55; }
  .face-label {
    font-size: 0.68rem;
    font-weight: 900;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .card-back .face-label { color: rgba(255,255,255,0.4); }
  .word {
    font-family: 'Outfit', sans-serif;
    font-size: 2.1rem;
    font-weight: 900;
    color: var(--ink);
    letter-spacing: -0.01em;
    text-align: center;
  }
  .card-back .word { color: var(--user-back-word); font-size: 1.6rem; }
  .pos {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 4px;
    font-style: italic;
  }
  .card-back .pos { color: rgba(255,255,255,0.5); }
  .meaning {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--user-back-meaning);
    margin-top: 8px;
    text-align: center;
  }
  .hint {
    position: absolute;
    bottom: 12px;
    font-size: 0.68rem;
    color: var(--border);
    letter-spacing: 0.05em;
  }
  .card-back .hint { color: rgba(255,255,255,0.2); }
  .learned-star {
    position: absolute;
    top: 12px; right: 14px;
    font-size: 1.1rem;
    display: none;
  }
  .kana {
    font-size: 1rem;
    color: var(--accent2);
    font-weight: 700;
    margin-top: 4px;
    letter-spacing: 0.05em;
  }
  .speak-btn {
    margin-top: 10px;
    background: var(--accent2);
    border: 2px solid var(--accent2);
    border-radius: 99px;
    padding: 6px 20px;
    font-size: 0.85rem;
    cursor: pointer;
    color: white;
    font-family: inherit;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
    box-shadow: 2px 2px 0 rgba(37,99,235,0.3);
  }
  .speak-btn:hover { background: #1d4ed8; border-color: #1d4ed8; }
  .speak-btn.speaking { background: var(--accent); border-color: var(--accent); animation: pulse 0.6s ease-in-out infinite alternate; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }

  /* Buttons */
  .nav-row {
    display: flex;
    width: 100%;
    gap: 10px;
    margin-bottom: 10px;
  }
  .btn {
    border: 2px solid var(--ink);
    border-radius: 8px;
    padding: 9px 18px;
    font-size: 0.88rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.12s;
    background: white;
    color: var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
  }
  .btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }
  .btn-primary { background: var(--ink); color: white; flex: 1; }
  .btn-learned { background: #d1fae5; color: #047857; border-color: #047857; box-shadow: 3px 3px 0 #047857; }
  .action-row {
    display: flex;
    width: 100%;
    gap: 8px;
    margin-bottom: 28px;
  }
  .btn-sm { padding: 7px 14px; font-size: 0.78rem; flex: 1; }

  /* Direction toggle */
  .dir-row {
    display: flex;
    width: 100%;
    border: 2px solid var(--accent);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 10px;
    box-shadow: 3px 3px 0 var(--accent);
  }
  .dir-btn {
    flex: 1;
    padding: 8px;
    text-align: center;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    border: none;
    font-family: inherit;
    background: white;
    color: var(--accent);
    transition: all 0.15s;
  }
  .dir-btn + .dir-btn { border-left: 2px solid var(--accent); }
  .dir-btn.active { background: var(--accent); color: white; }

  /* Mode tabs */
  .tabs {
    display: flex;
    width: 100%;
    border: 2px solid var(--ink);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 20px;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .tab {
    flex: 1;
    padding: 8px;
    text-align: center;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    border: none;
    font-family: inherit;
    background: white;
    color: var(--muted);
    transition: all 0.15s;
  }
  .tab + .tab { border-left: 2px solid var(--ink); }
  .tab.active { background: var(--ink); color: white; }

  /* Range selector */
  #rangeSelect {
    width: 100%;
    padding: 9px 14px;
    border: 2px solid var(--ink);
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 700;
    font-family: inherit;
    background: var(--card-bg);
    color: var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
    outline: none;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    text-align: center;
  }

  /* Card color settings */
  .color-toggle {
    border: 2px solid var(--border);
    background: white;
    border-radius: 8px;
    padding: 2px 8px;
    font-size: 0.9rem;
    cursor: pointer;
    line-height: 1.4;
  }
  #colorPanel {
    width: 100%;
    display: none;
    flex-wrap: wrap;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    margin-bottom: 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: var(--card-bg);
    box-shadow: 3px 3px 0 var(--border);
    font-size: 0.82rem;
    font-weight: 700;
  }
  #colorPanel label { display: flex; align-items: center; gap: 6px; }
  #colorPanel .color-face-label {
    background: var(--ink); color: var(--paper);
    border-radius: 5px; padding: 2px 8px; font-size: 0.75rem;
  }
  #colorPanel input[type="color"] {
    width: 34px; height: 30px; padding: 0;
    border: 2px solid var(--border); border-radius: 6px;
    background: none; cursor: pointer;
  }
  #colorPanel .color-reset {
    margin-left: auto;
    border: 2px solid var(--muted); background: white; color: var(--muted);
    border-radius: 8px; padding: 5px 12px; font-size: 0.78rem; font-weight: 700;
    font-family: inherit; cursor: pointer;
  }

  /* Leaderboard */
  .lb-title {
    width: 100%;
    font-size: 0.85rem;
    font-weight: 900;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--border);
  }
  .lb-list { width: 100%; display: flex; flex-direction: column; gap: 6px; }
  .lb-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
  }
  .lb-rank { font-weight: 900; font-size: 0.9rem; min-width: 24px; color: var(--muted); }
  .lb-name { flex: 1; font-weight: 700; font-size: 0.9rem; }
  .lb-score {
    font-weight: 900;
    font-size: 0.85rem;
    color: var(--accent);
  }
  .lb-empty { font-size: 0.82rem; color: var(--muted); text-align: center; padding: 16px; }

  /* Install banner */
  .install-banner {
    display: none;
    width: 100%;
    max-width: 520px;
    background: var(--ink);
    color: white;
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 20px;
    font-size: 0.82rem;
    line-height: 1.6;
    flex-direction: row;
    align-items: center;
    gap: 12px;
  }
  .ib-icon { font-size: 1.8rem; flex-shrink: 0; }
  .ib-text { flex: 1; }
  .ib-text strong { font-size: 0.9rem; display: block; margin-bottom: 2px; }
  .ib-close { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 1.2rem; cursor: pointer; padding: 0 0 0 8px; flex-shrink: 0; }
</style>
</head>
<body>

<header>
  <div class="unit-badge" id="unitBadge">ユメタン 0</div>
  <h1>ユメタン 0 フラッシュカード</h1>
  <p class="sub">カードをタップして意味を確認しよう</p>
</header>

<!-- iOS install banner -->
<div class="install-banner" id="installBanner">
  <div class="ib-icon">📲</div>
  <div class="ib-text">
    <strong>ホーム画面に追加できます</strong>
    Safari の 共有ボタン（□↑）→「ホーム画面に追加」でアプリとして使えます
  </div>
  <button class="ib-close" onclick="dismissBanner()">✕</button>
</div>

<!-- Name Setup -->
<div id="nameSetup">
  <p>👤 ニックネームを入力してください</p>
  <input id="nameInput" type="text" placeholder="例：たろう" maxlength="20">
  <button class="btn-start" onclick="startApp()">スタート →</button>
</div>

<!-- Main App -->
<div id="app">
  <div class="user-bar">
    <span class="user-name" id="userNameDisplay"></span>
    <span style="display:flex; align-items:center; gap:10px;">
      <span class="learned-count" id="learnedCount"></span>
      <button class="color-toggle" id="colorToggle" onclick="toggleColorPanel()" title="カードの色を変更">🎨</button>
    </span>
  </div>

  <!-- Card color settings -->
  <div id="colorPanel">
    <span class="color-face-label">表</span>
    <label>背景
      <input type="color" id="cardBgPicker" oninput="setCardColor('bg', this.value)">
    </label>
    <label>文字
      <input type="color" id="cardTextPicker" oninput="setCardColor('text', this.value)">
    </label>
    <span class="color-face-label">裏</span>
    <label>背景
      <input type="color" id="backBgPicker" oninput="setCardColor('backbg', this.value)">
    </label>
    <label>文字
      <input type="color" id="backTextPicker" oninput="setCardColor('backtext', this.value)">
    </label>
    <button class="color-reset" onclick="resetCardColor()">標準に戻す</button>
  </div>

  <!-- Direction toggle -->
  
  <!-- Type toggle -->
  <div class="tabs" style="margin-bottom: 10px;">
    <button class="tab active" id="typeWord" onclick="setType('word')">単語</button>
    <button class="tab" id="typePhrase" onclick="setType('phrase')">フレーズ</button>
  </div>
<div class="dir-row">
    <button class="dir-btn active" id="dirEN" onclick="setDirection('en2jp')">🇬🇧 英語 → 日本語</button>
    <button class="dir-btn" id="dirJP" onclick="setDirection('jp2en')">🇯🇵 日本語 → 英語</button>
  </div>

  <!-- Batch size toggle -->
  <div class="tabs" style="margin-bottom: 10px;">
    <button class="tab active" id="batchAll" onclick="setBatchSize(0)">全範囲</button>
    <button class="tab" id="batch50" onclick="setBatchSize(50)">50語ずつ</button>
    <button class="tab" id="batch100" onclick="setBatchSize(100)">100語ずつ</button>
  </div>

  <!-- Batch range selector (shown only when 50/100 is chosen) -->
  <div id="rangeWrap" style="display:none; width:100%; margin-bottom:20px;">
    <select id="rangeSelect" onchange="setBatchIndex(this.value)"></select>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabAll" onclick="setMode('all')">すべて (${CARDS.length}語)</button>
    <button class="tab" id="tabUnseen" onclick="setMode('unseen')">未学習のみ</button>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-fill" id="progFill"></div></div>
    <div class="counter" id="counter">1 / 30</div>
  </div>

  <div class="section-pill" id="sectionPill">〈タイトル〉</div>

  <div class="card-wrap" id="cardWrap" onclick="flip()">
    <div class="card-inner" id="cardInner">
      <!-- Front face: changes based on direction -->
      <div class="card-face card-front">
        <div class="face-label" id="frontLabel">English</div>
        <div class="word" id="frontWord"></div>
        <div class="pos" id="frontPos"></div>
        <div class="kana" id="frontKana"></div>
        <button class="speak-btn" id="speakBtnFront" onclick="event.stopPropagation(); speak()">🔊 発音を聞く</button>
        <div class="hint" id="frontHint">タップして日本語を確認</div>
        <div class="learned-star" id="learnedStar">⭐</div>
      </div>
      <!-- Back face: changes based on direction -->
      <div class="card-face card-back">
        <div class="face-label" id="backLabel">日本語</div>
        <div class="word" id="backWord"></div>
        <div class="pos" id="backPos"></div>
        <div class="meaning" id="backMeaning"></div>
        <div class="kana" id="backKana" style="color:rgba(255,255,255,0.6);margin-top:6px;display:none"></div>
        <button class="speak-btn" id="speakBtnBack" onclick="event.stopPropagation(); speak()" style="display:none;background:#e85d26;border-color:#e85d26">🔊 発音を聞く</button>
        <div class="hint">タップして戻る</div>
      </div>
    </div>
  </div>

  <div class="nav-row">
    <button class="btn" onclick="prev()">◀ 前へ</button>
    <button class="btn btn-primary" onclick="next()">次へ ▶</button>
  </div>
  <div class="action-row">
    <button class="btn btn-sm" onclick="doShuffle()">🔀 シャッフル</button>
    <button class="btn btn-sm btn-learned" onclick="markLearned()">⭐ 覚えた！</button>
    <button class="btn btn-sm" onclick="resetProgress()" style="color:#ef4444;border-color:#ef4444;box-shadow:3px 3px 0 #ef4444">🔄 リセット</button>
  </div>

  <!-- Leaderboard -->
  <div class="lb-title">📊 みんなの進捗</div>
  <div class="lb-list" id="lbList">
    <div class="lb-empty">まだ記録がありません</div>
  </div>

let CARDS = WORDS_DATA;

const STORAGE_KEY = 'yumetan0_lb_v1';
let userName = '';
let learned = [];

// --- 安全なlocalStorageアクセス (iOSプライベートモード等での例外を吸収) ---
function lsGet(key, fallback) {
  try { const v = localStorage.getItem(key); return (v === null || v === undefined) ? fallback : v; }
  catch { return fallback; }
}
function lsSet(key, value) {
  try { localStorage.setItem(key, value); return true; } catch { return false; }
}

// --- iPhone/iPad等でデータが消えにくいよう永続ストレージを要求 ---
(function requestPersistentStorage() {
  try {
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persisted().then(p => { if (!p) navigator.storage.persist(); }).catch(() => {});
    }
  } catch {}
})();

// --- LocalStorage leaderboard (shared via same browser/device is the simplest model;
//     for a true shared board we use the artifact storage API if available,
//     otherwise fall back to localStorage) ---

function loadLB() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  } catch { return []; }
}

function saveLB(board) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(board)); } catch {}
}

function updateLB() {
  if (!userName) return;
  let board = loadLB();
  const existing = board.find(r => r.name === userName);
  const score = learned.length;
  if (existing) { existing.score = score; existing.ts = Date.now(); }
  else { board.push({ name: userName, score, ts: Date.now() }); }
  board.sort((a,b) => b.score - a.score || a.ts - b.ts);
  saveLB(board);
  renderLB(board);
}

function renderLB(board) {
  const el = document.getElementById('lbList');
  if (!board.length) { el.innerHTML = '<div class="lb-empty">まだ記録がありません</div>'; return; }
  const medals = ['🥇','🥈','🥉'];
  el.innerHTML = board.slice(0,10).map((r,i) => `
    <div class="lb-row" style="${r.name===userName?'border-color:var(--accent2);background:#eff6ff':''}">
      <div class="lb-rank">${medals[i]||i+1}</div>
      <div class="lb-name">${escHtml(r.name)}${r.name===userName?' 👈':''}</div>
      <div class="lb-score">${r.score} / ${CARDS.length}語</div>
    </div>`).join('');
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// --- Text-to-Speech ---
let ttsVoice = null;
function loadVoice() {
  const voices = speechSynthesis.getVoices();
  ttsVoice = voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('samantha'))
    || voices.find(v => v.lang === 'en-US')
    || voices.find(v => v.lang.startsWith('en'))
    || null;
}
speechSynthesis.onvoiceschanged = loadVoice;
loadVoice();

function speak() {
  const word = deck[idx].word.replace(/～/g, '');
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(word);
  utt.lang = 'en-US';
  utt.rate = 0.85;
  if (ttsVoice) utt.voice = ttsVoice;
  const btnId = direction === 'en2jp' ? 'speakBtnFront' : 'speakBtnBack';
  const btn = document.getElementById(btnId);
  btn.classList.add('speaking');
  utt.onend = () => btn.classList.remove('speaking');
  utt.onerror = () => btn.classList.remove('speaking');
  speechSynthesis.speak(utt);
}


function startApp() {
  const n = document.getElementById('nameInput').value.trim();
  if (!n) { document.getElementById('nameInput').focus();
document.getElementById('tabAll').textContent = `すべて (${CARDS.length}語)`; return; }
  userName = n;
  // 次回このデバイスで同じ名前がすぐ使えるよう保存（履歴のキーを一致させる）
  lsSet('yumetan0_user', n);
  try { learned = JSON.parse(lsGet('yumetan0_learned_'+n, '[]')) || []; } catch { learned = []; }
  document.getElementById('nameSetup').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';
  document.getElementById('userNameDisplay').textContent = '👤 ' + userName;

  // 前回の学習位置を復元（方向・モードは共通、範囲/カードは種類ごと）
  let pos = null;
  try { pos = JSON.parse(lsGet('yumetan0_pos_' + n, 'null')); } catch {}
  let restoreWord = null;
  if (pos) {
    direction = (pos.direction === 'jp2en') ? 'jp2en' : 'en2jp';
    mode      = (pos.mode === 'unseen') ? 'unseen' : 'all';
    cardType  = (pos.lastType === 'phrase' || pos.cardType === 'phrase') ? 'phrase' : 'word';
    const sub = pos[cardType] || pos; // 種類別 → 無ければ旧形式にフォールバック
    batchSize = (sub.batchSize === 50 || sub.batchSize === 100) ? sub.batchSize : 0;
    batchIndex = Number.isInteger(sub.batchIndex) ? sub.batchIndex : 0;
    restoreWord = sub.word || null;
  }
  CARDS = (cardType === 'word') ? WORDS_DATA : PHRASES_DATA;

  // ボタン類の選択状態を復元した状態に合わせる
  document.getElementById('typeWord').classList.toggle('active', cardType === 'word');
  document.getElementById('typePhrase').classList.toggle('active', cardType === 'phrase');
  document.getElementById('dirEN').classList.toggle('active', direction === 'en2jp');
  document.getElementById('dirJP').classList.toggle('active', direction === 'jp2en');
  document.getElementById('tabAll').classList.toggle('active', mode === 'all');
  document.getElementById('tabUnseen').classList.toggle('active', mode === 'unseen');
  document.getElementById('batchAll').classList.toggle('active', batchSize === 0);
  document.getElementById('batch50').classList.toggle('active', batchSize === 50);
  document.getElementById('batch100').classList.toggle('active', batchSize === 100);
  buildRangeOptions();

  buildDeck();

  // 前回開いていたカードの位置まで戻す
  if (restoreWord) {
    const j = deck.findIndex(c => c.word === restoreWord);
    if (j >= 0) { idx = j; render(); }
  }

  // このユーザーのカード色設定を読み込む
  loadCardColors();

  updateLB();
  renderLB(loadLB());
}


function setType(t) {
  if (t === cardType) return;
  // 切り替える前に、今の種類の位置を保存しておく
  savePos();

  cardType = t;
  document.getElementById('typeWord').classList.toggle('active', t === 'word');
  document.getElementById('typePhrase').classList.toggle('active', t === 'phrase');
  CARDS = (t === 'word') ? WORDS_DATA : PHRASES_DATA;

  // この種類で前回開いていた範囲・カードを復元する
  let restoreWord = null;
  const sub = readPos()[t];
  if (sub) {
    batchSize = (sub.batchSize === 50 || sub.batchSize === 100) ? sub.batchSize : 0;
    batchIndex = Number.isInteger(sub.batchIndex) ? sub.batchIndex : 0;
    restoreWord = sub.word || null;
  } else {
    // この種類は初めて → 現在の範囲サイズは保ちつつ先頭から
    batchIndex = 0;
  }

  // 範囲ボタンの選択状態を合わせる
  document.getElementById('batchAll').classList.toggle('active', batchSize === 0);
  document.getElementById('batch50').classList.toggle('active', batchSize === 50);
  document.getElementById('batch100').classList.toggle('active', batchSize === 100);
  buildRangeOptions();

  // Build new deck (updateTabCounts はこの中で呼ばれる)
  buildDeck();

  // 前回開いていたカードまで戻す
  if (restoreWord) {
    const j = deck.findIndex(c => c.word === restoreWord);
    if (j >= 0) { idx = j; render(); }
  }
  savePos();
}

// 現在の範囲（50/100語ずつ）に絞ったカード群を返す。全範囲なら全体。
function scopedCards() {
  if (!batchSize) return CARDS;
  const start = batchIndex * batchSize;
  return CARDS.slice(start, start + batchSize);
}

// 範囲ドロップダウンの選択肢を作り直す
function buildRangeOptions() {
  const wrap = document.getElementById('rangeWrap');
  const sel = document.getElementById('rangeSelect');
  if (!batchSize) { wrap.style.display = 'none'; sel.innerHTML = ''; return; }
  const total = CARDS.length;
  const n = Math.ceil(total / batchSize);
  if (batchIndex >= n) batchIndex = 0;
  let html = '';
  for (let i = 0; i < n; i++) {
    const s = i * batchSize + 1;
    const e = Math.min((i + 1) * batchSize, total);
    // この範囲が属するUnit名（複数Unitにまたがる場合は「Unit A〜B」）
    const secStart = CARDS[s - 1] ? CARDS[s - 1].section : '';
    const secEnd = CARDS[e - 1] ? CARDS[e - 1].section : '';
    const unitLabel = (secStart === secEnd) ? secStart : (secStart + '〜' + secEnd.replace('Unit ', ''));
    html += '<option value="' + i + '">' + unitLabel + '：' + s + '〜' + e + '語</option>';
  }
  sel.innerHTML = html;
  sel.value = String(batchIndex);
  wrap.style.display = '';
}

// タブの語数表示を現在の範囲に合わせて更新
function updateTabCounts() {
  const base = scopedCards();
  const unseen = base.filter(c => !learned.includes(c.word)).length;
  document.getElementById('tabAll').textContent = 'すべて (' + base.length + '語)';
  document.getElementById('tabUnseen').textContent = '未学習のみ (' + unseen + '語)';
}

// 現在の学習位置を「単語」「フレーズ」別に保存する。
// 方向・モードは共通、範囲とカード位置は種類ごとに個別に記憶するので、
// 単語⇔フレーズを切り替えても、それぞれの続きから再開できる。
function readPos() {
  let data = {};
  try { data = JSON.parse(lsGet('yumetan0_pos_' + userName, '{}')) || {}; } catch { data = {}; }
  return data;
}
function savePos() {
  if (!userName) return;
  const data = readPos();
  data.lastType = cardType;
  data.direction = direction;
  data.mode = mode;
  const cur = deck[idx];
  data[cardType] = { batchSize, batchIndex, word: cur ? cur.word : null };
  lsSet('yumetan0_pos_' + userName, JSON.stringify(data));
}

// --- 単語カードの色設定（表・裏、ユーザーごとに保存） ---
const DEFAULT_CARD_BG = '#fffdf7';
const DEFAULT_CARD_TEXT = '#1a1a2e';
const DEFAULT_BACK_BG = '#1a1a2e';
const DEFAULT_BACK_WORD = '#ffffff';
const DEFAULT_BACK_MEANING = '#e85d26';
function loadCardColors() {
  const bg = lsGet('yumetan0_cardbg_' + userName, DEFAULT_CARD_BG);
  const text = lsGet('yumetan0_cardtext_' + userName, DEFAULT_CARD_TEXT);
  const backBg = lsGet('yumetan0_backbg_' + userName, DEFAULT_BACK_BG);
  // 裏の文字色: 未設定なら標準（単語=白、意味=オレンジ）、設定済みなら両方その色
  const backText = lsGet('yumetan0_backtext_' + userName, '');
  const backWord = backText || DEFAULT_BACK_WORD;
  const backMeaning = backText || DEFAULT_BACK_MEANING;

  const rs = document.documentElement.style;
  rs.setProperty('--user-card-bg', bg);
  rs.setProperty('--user-card-text', text);
  rs.setProperty('--user-back-bg', backBg);
  rs.setProperty('--user-back-word', backWord);
  rs.setProperty('--user-back-meaning', backMeaning);

  const set = (id, v) => { const el = document.getElementById(id); if (el) el.value = v; };
  set('cardBgPicker', bg);
  set('cardTextPicker', text);
  set('backBgPicker', backBg);
  set('backTextPicker', backText || DEFAULT_BACK_WORD);
}
function setCardColor(which, val) {
  if (which === 'bg') lsSet('yumetan0_cardbg_' + userName, val);
  else if (which === 'text') lsSet('yumetan0_cardtext_' + userName, val);
  else if (which === 'backbg') lsSet('yumetan0_backbg_' + userName, val);
  else if (which === 'backtext') lsSet('yumetan0_backtext_' + userName, val);
  loadCardColors();
}
function resetCardColor() {
  lsSet('yumetan0_cardbg_' + userName, DEFAULT_CARD_BG);
  lsSet('yumetan0_cardtext_' + userName, DEFAULT_CARD_TEXT);
  lsSet('yumetan0_backbg_' + userName, DEFAULT_BACK_BG);
  lsSet('yumetan0_backtext_' + userName, '');
  loadCardColors();
}
function toggleColorPanel() {
  const p = document.getElementById('colorPanel');
  if (!p) return;
  const shown = p.style.display === 'flex';
  p.style.display = shown ? 'none' : 'flex';
}

function setBatchSize(size) {
  // いま開いているカードを覚えておき、バッチ変更後もその単語を表示し続ける
  const curWord = deck[idx] ? deck[idx].word : null;

  batchSize = size;
  // 現在の単語がどの範囲に入るかを計算して、その範囲を開く（先頭に戻さない）
  if (size > 0 && curWord) {
    const gp = CARDS.findIndex(c => c.word === curWord);
    batchIndex = gp >= 0 ? Math.floor(gp / size) : 0;
  } else {
    batchIndex = 0;
  }
  document.getElementById('batchAll').classList.toggle('active', size === 0);
  document.getElementById('batch50').classList.toggle('active', size === 50);
  document.getElementById('batch100').classList.toggle('active', size === 100);
  buildRangeOptions();
  buildDeck();
  // 同じ単語までカード位置を戻す
  if (curWord) {
    const j = deck.findIndex(c => c.word === curWord);
    if (j >= 0) { idx = j; render(); }
  }
  savePos();
}

function setBatchIndex(i) {
  batchIndex = parseInt(i, 10) || 0;
  buildDeck();
  savePos();
}

function buildDeck() {
  const base = scopedCards();
  deck = mode === 'unseen'
    ? base.filter(c => !learned.includes(c.word))
    : [...base];
  if (!deck.length) deck = [...base];
  if (!deck.length) deck = [...CARDS];
  idx = 0;
  updateTabCounts();
  render();
}

function render() {
  const c = deck[idx];
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('sectionPill').textContent = c.section;
  document.getElementById('counter').textContent = (idx+1) + ' / ' + deck.length;
  document.getElementById('progFill').style.width = ((idx+1)/deck.length*100) + '%';
  document.getElementById('learnedStar').style.display = learned.includes(c.word) ? '' : 'none';
  document.getElementById('learnedCount').textContent = '⭐ ' + learned.length + '/' + CARDS.length + '語';
  updateTabCounts();

  const sfBtn = document.getElementById('speakBtnFront');
  const sbBtn = document.getElementById('speakBtnBack');
  const bKana = document.getElementById('backKana');

  if (direction === 'en2jp') {
    // Front: English word + kana + speak
    document.getElementById('frontLabel').textContent = 'English';
    document.getElementById('frontWord').textContent = c.word;
    document.getElementById('frontPos').textContent = c.pos;
    document.getElementById('frontKana').textContent = c.kana;
    document.getElementById('frontHint').textContent = 'タップして日本語を確認';
    sfBtn.style.display = '';
    // Back: Japanese meaning
    document.getElementById('backLabel').textContent = '日本語';
    document.getElementById('backWord').textContent = '';
    document.getElementById('backPos').textContent = '';
    document.getElementById('backMeaning').textContent = c.meaning;
    bKana.style.display = 'none';
    sbBtn.style.display = 'none';
    setTimeout(speak, 300);
  } else {
    // Front: Japanese meaning
    document.getElementById('frontLabel').textContent = '日本語';
    document.getElementById('frontWord').textContent = c.meaning;
    document.getElementById('frontPos').textContent = c.pos;
    document.getElementById('frontKana').textContent = '';
    document.getElementById('frontHint').textContent = 'タップして英語を確認';
    sfBtn.style.display = 'none';
    // Back: English word + kana + speak
    document.getElementById('backLabel').textContent = 'English';
    document.getElementById('backWord').textContent = c.word;
    document.getElementById('backPos').textContent = c.pos;
    document.getElementById('backMeaning').textContent = '';
    bKana.textContent = c.kana;
    bKana.style.display = '';
    sbBtn.style.display = '';
  }
}

function flip() {
  if (justSwiped) return; // スワイプ直後のタップ判定では裏返さない
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
  if (isFlipped && direction === 'jp2en') setTimeout(speak, 300);
}

// --- スワイプでカード送り（左=次へ / 右=前へ）。タップは従来どおり裏返し ---
let touchStartX = 0, touchStartY = 0, justSwiped = false;
(function setupSwipe() {
  const cw = document.getElementById('cardWrap');
  if (!cw || !cw.addEventListener) return;
  cw.addEventListener('touchstart', (e) => {
    const t = e.changedTouches && e.changedTouches[0];
    if (!t) return;
    touchStartX = t.clientX;
    touchStartY = t.clientY;
  }, { passive: true });
  cw.addEventListener('touchend', (e) => {
    const t = e.changedTouches && e.changedTouches[0];
    if (!t) return;
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    // 横方向に50px以上、かつ縦より明確に大きい動きをスワイプと見なす
    if (Math.abs(dx) >= 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      justSwiped = true;
      if (dx < 0) next(); else prev();
      // 直後に発生するclick(flip)を抑止し、少し後に解除
      setTimeout(() => { justSwiped = false; }, 350);
    }
  }, { passive: true });
})();

function next() { idx = (idx+1) % deck.length; render(); savePos(); }
function prev() { idx = (idx-1+deck.length) % deck.length; render(); savePos(); }

function doShuffle() {
  for (let i=deck.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [deck[i],deck[j]]=[deck[j],deck[i]];
  }
  idx=0; render(); savePos();
}

function markLearned() {
  const w = deck[idx].word;
  if (!learned.includes(w)) {
    learned.push(w);
    lsSet('yumetan0_learned_'+userName, JSON.stringify(learned));
    updateLB();
  }
  document.getElementById('learnedStar').style.display = '';
  document.getElementById('learnedCount').textContent = '⭐ ' + learned.length + '/' + CARDS.length + '語';
  updateTabCounts();
  setTimeout(next, 280);
}

function resetProgress() {
  if (!confirm('進捗をリセットしますか？')) return;
  learned = [];
  try { localStorage.removeItem('yumetan0_learned_'+userName); } catch {}
  updateLB();
  buildDeck();
  savePos();
}

function setDirection(dir) {
  direction = dir;
  document.getElementById('dirEN').classList.toggle('active', dir === 'en2jp');
  document.getElementById('dirJP').classList.toggle('active', dir === 'jp2en');
  idx = 0;
  render();
  savePos();
}

function setMode(m) {
  mode = m;
  document.getElementById('tabAll').classList.toggle('active', m==='all');
  document.getElementById('tabUnseen').classList.toggle('active', m==='unseen');
  buildDeck();
  savePos();
}

document.addEventListener('keydown', e => {
  if (!userName) return;
  if (e.key===' '||e.key==='Enter') { e.preventDefault(); flip(); }
  if (e.key==='ArrowRight') next();
  if (e.key==='ArrowLeft') prev();
  if (e.key==='l'||e.key==='L') markLearned();
});

// Auto-focus + iOS install banner
function dismissBanner() {
  document.getElementById('installBanner').style.display = 'none';
  localStorage.setItem('yumetan0_banner_dismissed', '1');
}

window.onload = () => {
  // 前回の名前を復元して入力欄に自動入力（同じ履歴をすぐ呼び出せる）
  const savedUser = lsGet('yumetan0_user', '');
  const nameInput = document.getElementById('nameInput');
  if (savedUser) nameInput.value = savedUser;
  nameInput.focus();
document.getElementById('tabAll').textContent = `すべて (${CARDS.length}語)`;
  // Show banner on iOS Safari if not already installed or dismissed
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = navigator.standalone === true;
  const dismissed = localStorage.getItem('yumetan0_banner_dismissed');
  if (isIOS && !isStandalone && !dismissed) {
    document.getElementById('installBanner').style.display = 'flex';
  }
};
</script>
